<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Client - RX SERVICES</title>
    <link rel="stylesheet" href="rxservices.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-image: linear-gradient(rgba(32, 178, 170, 0.2), rgba(0,0,0,0.8)), url('hero-rx-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Simplified Header for Login Page */
        .header-login {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .header-login .logo h1 {
            color: var(--white);
            font-size: 1.8rem;
        }
        .header-login a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }
        .header-login a:hover {
            color: var(--primary);
        }

        /* Login Container */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 5%;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .login-box h2 {
            color: var(--white);
            margin-bottom: 0.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }
        
        .login-box p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.6);
        }

        .login-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
        }

        .login-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
        }

        .login-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .login-actions label {
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .login-actions a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .login-actions a:hover {
            text-decoration: underline;
        }

        .btn-login {
            background: var(--primary);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(32, 178, 170, 0.3);
        }

        .btn-login:hover {
            background: #1c9e97;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(32, 178, 170, 0.4);
        }

    </style>
</head>
<body>

    <header class="header-login">
        <div class="logo">
            <a href="index.html"><h1>RX SERVICES</h1></a>
        </div>
        <div>
            <a href="index.html"><i class="fas fa-arrow-left"></i> Retour au site</a>
        </div>
    </header>

    <main class="login-wrapper">
        <div class="login-box">
            <h2>Espace Client</h2>
            <p>Connectez-vous pour accéder à vos tableaux de bord et suivre vos projets.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Adresse E-mail professionnelle" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Mot de passe" required>
                </div>
                
                <div class="login-actions">
                    <label>
                        <input type="checkbox"> Se souvenir de moi
                    </label>
                    <a href="#">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-login">Se Connecter <i class="fas fa-sign-in-alt"></i></button>
            </form>
            
            <p style="margin-top: 2rem; margin-bottom: 0;">
                Vous n'avez pas encore d'accès ? <br>
                <a href="contact.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Contactez votre administrateur</a>
            </p>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simuler une connexion
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
            btn.style.opacity = '0.8';
            
            setTimeout(() => {
                alert("Interface client en cours de développement. Les accès seront bientôt ouverts.");
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
            }, 1000);
        });
    </script>
</body>
</html>
